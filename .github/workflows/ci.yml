name: CI - Test, Build and Push Docker Images

on:
  pull_request:
    branches: ["main", "master"]
    paths:
      - "fwa-subscription-ui/**"
      - "subscription-platform/**"
      - ".github/workflows/ci.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "fwa-subscription-ui/**"
      - "subscription-platform/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE_NAME: subscription-platform
  FRONTEND_IMAGE_NAME: fwa-subscription-ui

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subscription-platform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print commit SHA
        run: git rev-parse HEAD

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Grant execute permission to Maven wrapper
        run: chmod +x subscription-platform/mvnw

      - name: Run backend tests
        run: ./mvnw -e -DtrimStackTrace=false test

      - name: Upload backend test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: subscription-platform/target/surefire-reports

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fwa-subscription-ui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fwa-subscription-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --watch=false

      - name: Build frontend app
        run: npm run build

  backend-build-push:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Grant execute permission to Maven wrapper
        run: chmod +x subscription-platform/mvnw

      - name: Package backend
        working-directory: subscription-platform
        run: ./mvnw -DskipTests package

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./subscription-platform
          file: ./subscription-platform/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-build-push:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./fwa-subscription-ui
          file: ./fwa-subscription-ui/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max