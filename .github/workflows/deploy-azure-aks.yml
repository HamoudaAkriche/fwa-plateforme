name: CD - Deploy to Azure AKS

on:
  workflow_run:
    workflows: ["CI - Test, Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy. Leave empty to use the commit SHA.
        required: false
        default: ""

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE_NAME: subscription-platform
  FRONTEND_IMAGE_NAME: fwa-subscription-ui
  AZURE_AKS_RESOURCE_GROUP: ${{ secrets.AZURE_AKS_RESOURCE_GROUP }}
  AZURE_AKS_CLUSTER_NAME: ${{ secrets.AZURE_AKS_CLUSTER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> "$GITHUB_ENV"
          elif [ -n "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          fi

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AZURE_AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AZURE_AKS_CLUSTER_NAME }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Apply Kubernetes secret
        run: |
          set -euo pipefail
          kubectl apply -f k8s/postgres-secret.yaml

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml

      - name: Pin backend and frontend images
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          kubectl set image deployment/subscription-platform subscription-platform=${DOCKERHUB_USERNAME}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}
          kubectl set image deployment/fwa-subscription-ui fwa-subscription-ui=${DOCKERHUB_USERNAME}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}

      - name: Wait for rollout
        run: |
          set -euo pipefail
          kubectl rollout status deployment/subscription-platform --timeout=180s
          kubectl rollout status deployment/fwa-subscription-ui --timeout=180s