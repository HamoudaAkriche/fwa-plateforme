<div class="container py-4" style="max-width: 680px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Super Admin - Create Agent</h2>
    <button type="button" class="btn btn-outline-secondary" (click)="backToSubscriptions()">Back</button>
  </div>

  <div class="card">
    <div class="card-header fw-bold">New agent account</div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" [(ngModel)]="username" placeholder="agent username" [disabled]="loading" />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          class="form-control"
          type="password"
          [(ngModel)]="password"
          placeholder="agent password"
          [disabled]="loading" />
      </div>

      <button type="button" class="btn btn-primary" (click)="createAgent()" [disabled]="loading">
        {{ loading ? 'Creating...' : 'Create agent' }}
      </button>

      <div class="alert alert-danger mt-3 mb-0" *ngIf="error">{{ error }}</div>
      <div class="alert alert-success mt-3 mb-0" *ngIf="success">{{ success }}</div>
    </div>
  </div>
</div>
