<main class="login-page">
  <!-- Left Side: Brand -->
  <section class="login-brand">
    <div class="bg-orb orb-blue" aria-hidden="true"></div>
    <div class="bg-orb orb-cyan" aria-hidden="true"></div>
    <div class="bg-orb orb-green" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>

    <div class="brand-content">
      <p class="eyebrow">FWA Subscription Platform</p>
      <h1 class="brand-title">Welcome</h1>
      <p class="brand-desc">
        Sign in to monitor subscription health, manage lifecycle actions, and track
        operations history in real time.
      </p>
    </div>
  </section>

  <!-- Right Side: Card -->
  <section class="login-card-section">
    <div class="login-card">
      <div class="card-header">
        <h2>Account Sign In</h2>
        <p>Use your platform credentials to continue.</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="field">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            [(ngModel)]="username"
            placeholder="Enter username"
            required
            [disabled]="loading"
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-row">
            <input
              id="password"
              name="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              placeholder="Enter password"
              required
              [disabled]="loading"
            />
            <button
              type="button"
              class="toggle-pwd"
              (click)="togglePasswordVisibility()"
              [disabled]="loading"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            >
              @if (showPassword) {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Signing in…' : 'Sign in' }}
        </button>
      </form>

      @if (error) {
        <p class="error-msg">{{ error }}</p>
      }
    </div>
  </section>
</main>
